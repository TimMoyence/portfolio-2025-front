<div class="slide-image-right" [class]="'accent-' + accent()">
  <div class="slide-image-right__content">
    @if (title()) {
      <h2>{{ title() }}</h2>
    }
    @for (p of paragraphs(); track $index) {
      <p class="slide-image-right__paragraph">{{ p }}</p>
    }
    @if (items().length > 0) {
      <ul class="slide-image-right__items">
        @for (it of items(); track it) {
          <li>{{ it }}</li>
        }
      </ul>
    }
    <ng-content />
  </div>
  <div class="slide-image-right__media">
    <img [src]="image()" [alt]="imageAlt()" loading="lazy" decoding="async" />
  </div>
</div>
