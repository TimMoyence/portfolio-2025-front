<div class="slide-image-right" [class]="'accent-' + accent()">
  <div class="slide-image-right__content">
    @if (title()) {
      <h2>{{ title() }}</h2>
    }
    <ng-content />
  </div>
  <div class="slide-image-right__media">
    <img [src]="image()" [alt]="imageAlt()" loading="lazy" decoding="async" />
  </div>
</div>
