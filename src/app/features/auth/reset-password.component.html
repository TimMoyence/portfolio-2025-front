<app-hero-section
  [label]="hero.label"
  [title]="hero.title"
  [description]="hero.description"
  titleLevel="h1"
  align="left"
></app-hero-section>

<section class="px-[5%] py-8 md:py-10 lg:py-12 bg-scheme-background">
  <div class="container max-w-xl">
    <form #formRef="ngForm" (ngSubmit)="submit(formRef)" class="space-y-6">
      <div class="space-y-2">
        <label
          for="newPassword"
          class="block text-sm text-scheme-text"
          i18n="@@authResetPasswordLabel"
          >Nouveau mot de passe</label
        >
        <input
          id="newPassword"
          name="newPassword"
          type="password"
          required
          minlength="12"
          [(ngModel)]="newPassword"
          #newPasswordCtrl="ngModel"
          class="w-full rounded-form border border-scheme-border bg-scheme-surface px-3 py-2 focus:border-scheme-accent focus:outline-none"
          [class.border-red-500]="
            newPasswordCtrl.invalid && (newPasswordCtrl.touched || submitted)
          "
        />
      </div>

      <div class="space-y-2">
        <label
          for="confirmPassword"
          class="block text-sm text-scheme-text"
          i18n="@@authResetConfirmLabel"
          >Confirmer le mot de passe</label
        >
        <input
          id="confirmPassword"
          name="confirmPassword"
          type="password"
          required
          minlength="12"
          [(ngModel)]="confirmPassword"
          #confirmPasswordCtrl="ngModel"
          class="w-full rounded-form border border-scheme-border bg-scheme-surface px-3 py-2 focus:border-scheme-accent focus:outline-none"
          [class.border-red-500]="
            confirmPasswordCtrl.invalid &&
            (confirmPasswordCtrl.touched || submitted)
          "
        />
      </div>

      <button
        type="submit"
        class="inline-flex items-center justify-center rounded-button bg-scheme-accent px-6 py-3 text-white disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="isLoading || !token"
        [attr.aria-busy]="isLoading"
      >
        @if (!isLoading) {
          <span i18n="@@authResetSubmit"
            >Enregistrer le nouveau mot de passe</span
          >
        } @else {
          <span i18n="@@authResetLoading">Mise à jour en cours...</span>
        }
      </button>

      @if (successMessage) {
        <p class="text-sm text-green-600" role="status" aria-live="polite">
          {{ successMessage }}
        </p>
      }

      @if (errorMessage) {
        <p class="text-sm text-red-500" role="alert" aria-live="assertive">
          {{ errorMessage }}
        </p>
      }

      <p class="text-sm text-scheme-text-muted">
        <a routerLink="/login" class="underline" i18n="@@authResetBackToLogin"
          >Retour à la connexion</a
        >
      </p>
    </form>
  </div>
</section>
