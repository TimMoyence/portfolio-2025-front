<app-hero-section
  [label]="hero.label"
  [title]="hero.title"
  [description]="hero.description"
  titleLevel="h1"
  align="left"
></app-hero-section>

<section class="px-[5%] py-8 md:py-10 lg:py-12 bg-scheme-background">
  <div class="container max-w-xl">
    <form #formRef="ngForm" (ngSubmit)="submit(formRef)" class="space-y-6">
      <div class="space-y-2">
        <label
          for="email"
          class="block text-sm text-scheme-text"
          i18n="@@authForgotEmailLabel"
          >Email</label
        >
        <input
          id="email"
          name="email"
          type="email"
          required
          [(ngModel)]="email"
          #emailCtrl="ngModel"
          class="w-full rounded-form border border-scheme-border bg-scheme-surface px-3 py-2 focus:border-scheme-accent focus:outline-none"
          [class.border-red-500]="
            emailCtrl.invalid && (emailCtrl.touched || submitted)
          "
          placeholder="john@example.com"
        />
        @if (emailCtrl.invalid && (emailCtrl.touched || submitted)) {
          <p class="text-xs text-red-500" i18n="@@authForgotEmailError">
            Veuillez renseigner un email valide.
          </p>
        }
      </div>

      <button
        type="submit"
        class="inline-flex items-center justify-center rounded-button bg-scheme-accent px-6 py-3 text-white disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="isLoading"
        [attr.aria-busy]="isLoading"
      >
        @if (!isLoading) {
          <span i18n="@@authForgotSubmit">Envoyer le lien</span>
        } @else {
          <span i18n="@@authForgotLoading">Envoi en cours...</span>
        }
      </button>

      @if (successMessage) {
        <p class="text-sm text-green-600">{{ successMessage }}</p>
      }

      @if (errorMessage) {
        <p class="text-sm text-red-500">{{ errorMessage }}</p>
      }

      <p class="text-sm text-scheme-text-muted">
        <a routerLink="/login" class="underline" i18n="@@authForgotBackToLogin"
          >Retour à la connexion</a
        >
      </p>
    </form>
  </div>
</section>
