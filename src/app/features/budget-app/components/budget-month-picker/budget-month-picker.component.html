<div class="grid gap-2">
  <label
    class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-500"
    for="budgetMonthPickerSelect"
    i18n="@@budgetMonthPickerLabel"
  >
    Mois
  </label>
  <select
    id="budgetMonthPickerSelect"
    class="rounded-2xl border border-[#d7cfbf] bg-[#fffdf8] px-4 py-3 text-slate-900"
    [value]="selectedValue()"
    (change)="onSelectionChange($event)"
    aria-label="Sélectionner un mois"
    i18n-aria-label="@@budgetMonthPickerAriaLabel"
  >
    @for (option of options(); track optionValue(option)) {
      <option
        [value]="optionValue(option)"
        [selected]="optionValue(option) === selectedValue()"
      >
        {{ formatLabel(option) }}
      </option>
    }
  </select>
</div>
