<div
  class="mt-8 flex flex-col items-center justify-center rounded-[2rem] border border-dashed border-budget-accent/40 bg-white/80 px-8 py-16 text-center shadow-[0_8px_24px_rgba(25,33,52,0.06)]"
>
  <div
    class="mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-budget-accent/10"
    aria-hidden="true"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-8 w-8 text-budget-accent"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"
      />
    </svg>
  </div>

  <h2
    class="text-2xl font-black text-slate-900"
    data-testid="empty-title"
    i18n="@@budgetEmptyStateTitle"
  >
    Aucune donnée pour ce mois
  </h2>
  <p
    class="mt-3 max-w-md text-base leading-7 text-slate-500"
    data-testid="empty-description"
    i18n="@@budgetEmptyStateDescription"
  >
    Importez un fichier CSV ou créez votre première entrée manuellement pour
    commencer à suivre votre budget.
  </p>

  <div class="mt-8 flex flex-wrap justify-center gap-4">
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-6 py-3 text-sm font-semibold text-slate-900 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md"
      data-testid="empty-import-btn"
      aria-label="Importer un fichier CSV"
      i18n-aria-label="@@budgetEmptyStateImportAriaLabel"
      (click)="onImport()"
      i18n="@@budgetEmptyStateImportBtn"
    >
      Importer un CSV
    </button>

    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-full bg-budget-accent px-6 py-3 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5 hover:shadow-md"
      data-testid="empty-create-btn"
      aria-label="Créer une entrée manuellement"
      i18n-aria-label="@@budgetEmptyStateCreateAriaLabel"
      (click)="onCreate()"
      i18n="@@budgetEmptyStateCreateBtn"
    >
      Créer une entrée manuellement
    </button>
  </div>
</div>
