@if (invitations().length > 0) {
  <section
    class="mt-3 rounded-xl bg-slate-50/80 p-3"
    data-testid="budget-pending-invitations"
  >
    <h3
      class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500"
      i18n="@@budget-app.pending.title"
    >
      Invitations en attente
    </h3>
    <ul class="list-none space-y-1 p-0">
      @for (inv of enriched(); track inv.id) {
        <li class="flex items-center justify-between py-1 text-sm">
          <span class="text-slate-800">{{ inv.targetEmail }}</span>
          <span
            class="text-xs text-slate-500"
            i18n="@@budget-app.pending.expires"
          >
            expire dans {{ inv.daysLeft }} j
          </span>
        </li>
      }
    </ul>
  </section>
}
